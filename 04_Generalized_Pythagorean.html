<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Γενικευμένο Πυθαγόρειο Θεώρημα – GeoGebra</title>

  <script src="https://www.geogebra.org/apps/deployggb.js"></script>

  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 16px 28px;
    }

    header {
      text-align: center;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0 auto;
      max-width: 900px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }

    .applet-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    #ggb-element {
      width: 100%;
      height: min(78vh, 820px);
      min-height: 520px;
      border-radius: 12px;
      overflow: hidden;
    }

    footer {
      margin-top: 14px;
      text-align: center;
      font-size: 0.92rem;
      color: var(--muted);
    }

    .note {
      margin-top: 8px;
      text-align: center;
      font-size: 0.95rem;
      color: var(--muted);
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 1.45rem;
      }

      #ggb-element {
        height: 68vh;
        min-height: 420px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <h1>Γενικευμένο Πυθαγόρειο Θεώρημα</h1>
      <p class="subtitle">
        Νόμος συνημιτόνων για τυχαίο τρίγωνο
      </p>
    </header>

    <main class="applet-card">
      <div id="ggb-element"></div>
    </main>

    <p class="note">
      Χρησιμοποίησε μετακίνηση, zoom και το κουμπί επαναφοράς της εφαρμογής.
    </p>

    <footer>
      Δημιουργία: GeoGebra Classic · Φιλοξενία: GitHub Pages
    </footer>
  </div>

  <script>
    const params = {
      appName: "classic",
      showToolBar: false,
      showAlgebraInput: false,
      showMenuBar: false,
      showResetIcon: false,
	  enableRightClick: false,
	  enableLabelDrags: false,
      useBrowserForJS: true,

      appletOnLoad: function (api) {
        api.setPerspective("G");
      },

      filename: "./04_Generalized_Pythagorean.ggb"
    };

    const applet = new GGBApplet(params, true);

    window.addEventListener("load", function () {
      applet.inject("ggb-element");
    });
  </script>
</body>
</html>
